# Сборка с base /saas-fit/ (vite.config.ts) и публикация в GitHub Pages.
# Settings → Pages → Source: GitHub Actions.
#
# Обязательно задайте в репозитории (любой вариант):
#   Settings → Secrets and variables → Actions → Secrets:
#     VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
#   или Variables (не секретно): те же имена — подставятся, если секретов нет.
#
# Важно: Vite подставляет VITE_* только на этапе npm run build (не в рантайме на Pages).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Все шаги с npm/node наследуют эти переменные — сборка всегда видит ключи Supabase.
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Проверить переменные для Vite
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ] || [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Не заданы VITE_SUPABASE_URL или VITE_SUPABASE_ANON_KEY."
            echo "Добавьте их: Repository → Settings → Secrets and variables → Actions"
            echo "(Secrets или Variables с этими именами)."
            exit 1
          fi
          echo "VITE_* заданы, длина URL: ${#VITE_SUPABASE_URL}"

      - run: npm ci

      - run: npm run build

      # SPA на GitHub Pages: при заходе на /saas-fit/login сервер отдаёт 404 без файла.
      # Дубликат index → 404.html позволяет загрузить приложение и отработать клиентскому роутеру.
      - name: SPA fallback для GitHub Pages
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
