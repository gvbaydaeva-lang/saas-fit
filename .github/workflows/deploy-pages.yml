# Деплой на GitHub Pages (base /saas-fit/, см. vite.config.ts)
#
# Secrets (обязательно):
#   VITE_SUPABASE_URL      — Supabase → Settings → API → Project URL
#   VITE_SUPABASE_ANON_KEY — Supabase → Settings → API → anon public
#
# Pages: Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Проверить Secrets / Variables
        run: |
          if [ -z "${VITE_SUPABASE_URL}" ]; then
            echo "::error::Secret/Variable VITE_SUPABASE_URL не задан."
            exit 1
          fi
          if [ -z "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "::error::Secret/Variable VITE_SUPABASE_ANON_KEY не задан."
            exit 1
          fi
          echo "OK: VITE_SUPABASE_URL задан (${#VITE_SUPABASE_URL} символов)"

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}

      - name: Проверить артефакты (index + 404 + assets)
        run: |
          test -f dist/index.html || (echo "::error::Нет dist/index.html" && exit 1)
          test -f dist/404.html || (echo "::error::Нет dist/404.html — postbuild не сработал" && exit 1)
          grep -q '/saas-fit/assets/' dist/index.html || (echo "::error::В index.html неверные пути assets (ожидается /saas-fit/assets/)" && exit 1)
          echo "Артефакты сборки в порядке"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
