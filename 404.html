<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FitCRM</title>
  <script>
    /**
     * GitHub Pages SPA для репозитория saas-fit (сайт в подкаталоге /saas-fit/).
     * При прямом заходе на /saas-fit/login сервер отдаёт этот файл вместо 404.
     * После сборки в dist/ кладётся копия index.html (см. scripts/postbuild-pages.mjs).
     * Этот redirect — запасной вариант, если открыт именно этот шаблон.
     */
    (function () {
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    })();
  </script>
</head>
<body>
  <p style="font-family: system-ui; padding: 2rem;">Перенаправление…</p>
</body>
</html>
